version: "3.9"

services:
  db:
    image: postgres:15
    container_name: prototype_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prototype_app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: prototype_app_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/prototype_app
      JWT_SECRET: change_me_in_prod
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - storage_data:/app/storage

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: prototype_app_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pg_data:
  storage_data:
